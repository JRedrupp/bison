name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | bash
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: pixi install

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit checks
        run: pixi run lint

      - name: Generate version file
        run: pixi run gen-version

      - name: Run tests
        run: pixi run test

      - name: Update compatibility table
        run: |
          PASSING=$(cat .test-pass-count 2>/dev/null || echo 0)
          python scripts/update_compat.py --passing "$PASSING"

      - name: Commit updated README
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update compatibility table [skip ci]"
          git push
