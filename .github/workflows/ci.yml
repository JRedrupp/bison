name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.max-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - max-version: locked   # exact versions from pixi.lock
            pixi-locked: true
          - max-version: latest   # newest MAX satisfying >=26.1
            pixi-locked: false

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          locked: ${{ matrix.pixi-locked }}

      - name: Upgrade MAX to latest
        if: matrix.max-version == 'latest'
        run: pixi update max

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit checks
        run: pixi run lint

      - name: Generate version file
        run: pixi run gen-version

      - name: Run tests
        run: pixi run test
