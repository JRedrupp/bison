name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.max-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - max-version: locked   # exact versions from pixi.lock
            pixi-flags: "--locked"
          - max-version: latest   # newest MAX satisfying >=26.1
            pixi-flags: ""

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          frozen: ${{ matrix.max-version == 'locked' }}

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit checks
        run: pixi run lint

      - name: Generate version file
        run: pixi run gen-version

      - name: Run tests
        run: pixi run test

      - name: Update compatibility table
        if: matrix.max-version == 'locked'
        run: |
          PASSING=$(cat .test-pass-count 2>/dev/null || echo 0)
          python scripts/update_compat.py --passing "$PASSING"

      - name: Commit updated README
        if: >
          matrix.max-version == 'locked' &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --cached --quiet; then
            git commit --amend --no-edit
            git push --force-with-lease origin HEAD:main
          fi
