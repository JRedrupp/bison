name: Benchmarks

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bench:
    name: bench
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          locked: true

      - name: Generate version file
        run: pixi run gen-version

      - name: Run benchmarks
        run: pixi run bench

      - name: Verify benchmark results were recorded
        run: |
          COMMIT="$(git rev-parse HEAD)"
          RESULT_FILE="results/${COMMIT}.json"
          if [ ! -f "$RESULT_FILE" ]; then
            echo "::error::benchmark result file $RESULT_FILE not found — run_benchmarks.sh did not complete"
            exit 1
          fi
          COUNT=$(python3 -c "import json, sys; print(len(json.load(open('$RESULT_FILE'))['results']))")
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::benchmark result file $RESULT_FILE contains zero entries — every bench_*.mojo process crashed"
            exit 1
          fi
          echo "OK: $COUNT benchmark entries recorded in $RESULT_FILE"

      - name: Stash dashboard HTML from main
        run: cp docs/index.html /tmp/dashboard-index.html

      - name: Checkout gh-pages into docs/
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: docs

      - name: Restore dashboard HTML over gh-pages copy
        run: cp /tmp/dashboard-index.html docs/index.html

      - name: Generate report
        run: pixi run gen-report

      - name: Push updated dashboard
        working-directory: docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json index.html
          git diff --cached --quiet || git commit -m "perf: update benchmark dashboard [skip ci]"
          git push origin gh-pages
