name: Nightly

on:
  schedule:
    - cron: '0 3 * * *'  # daily at 03:00 UTC
  workflow_dispatch:      # allow manual triggers
  pull_request:           # run on every PR to catch nightly breakage early
  push:
    branches: [main]      # run on every merge to main

jobs:
  test-nightly:
    name: test (nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Switch to Mojo nightly channel
        run: |
          sed -i \
            's|https://conda.modular.com/max"|https://conda.modular.com/max-nightly"|g' \
            pixi.toml

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          locked: false

      - name: Generate version file
        run: pixi run gen-version

      - name: Run tests
        run: pixi run test
