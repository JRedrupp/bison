name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: prefix-dev/setup-pixi@v0.9.5

      - name: Generate version file
        run: pixi run gen-version

      - name: Run tests
        run: pixi run test

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-from-tag \
            --verify-tag
