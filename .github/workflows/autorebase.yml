name: Automatic Rebase

on:
  push:
    branches:
      - main

jobs:
  rebase:
    name: Rebase
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch all branches
        run: git fetch origin '+refs/heads/*:refs/heads/*' --update-head-ok

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Cache Rust/Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install autorebase
        run: cargo install autorebase --version 0.6.0 --locked

      - name: Run autorebase
        run: autorebase --onto main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push rebased branches
        run: |
          git for-each-ref --format='%(refname:short)' refs/heads/ | grep -v '^main$' | while read branch; do
            git push origin "$branch" --force-with-lease && echo "Pushed $branch" || echo "Skipped $branch (push rejected)"
          done
