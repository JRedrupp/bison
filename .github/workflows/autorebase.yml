name: Automatic Rebase

on:
  push:
    branches:
      - main

jobs:
  rebase:
    name: Rebase
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch all branches
        run: git fetch --all

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Install autorebase
        run: cargo install autorebase --version 0.6.0 --locked

      - name: Run autorebase
        run: autorebase --onto main
