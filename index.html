<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bison performance vs pandas</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2"></script>
  <style>
    :root {
      --bg: #ffffff;
      --bg-alt: #f6f8fa;
      --border: #d0d7de;
      --text: #1f2328;
      --text-muted: #656d76;
      --green-bg: #dafbe1;
      --green-text: #1a7f37;
      --yellow-bg: #fff8c5;
      --yellow-text: #9a6700;
      --red-bg: #ffebe9;
      --red-text: #cf222e;
      --parity-line: rgba(100, 100, 100, 0.5);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --bg-alt: #161b22;
        --border: #30363d;
        --text: #e6edf3;
        --text-muted: #8b949e;
        --green-bg: #0f2b14;
        --green-text: #3fb950;
        --yellow-bg: #2d2200;
        --yellow-text: #d29922;
        --red-bg: #2b0d0d;
        --red-text: #f85149;
        --parity-line: rgba(180, 180, 180, 0.4);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 2rem 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    #subtitle {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }

    h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    section { margin-bottom: 2.5rem; }

    /* Summary table */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    th, td {
      text-align: left;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
    }

    th {
      background: var(--bg-alt);
      font-weight: 600;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:nth-child(even) td { background: var(--bg-alt); }

    td.skipped { color: var(--text-muted); font-style: italic; }

    .ratio-fast { background: var(--green-bg); color: var(--green-text); font-weight: 600; }
    .ratio-slow { background: var(--red-bg);  color: var(--red-text);  font-weight: 600; }
    .ratio-mid  { background: var(--yellow-bg); color: var(--yellow-text); font-weight: 600; }

    .trend-up   { color: var(--green-text); font-weight: 600; }
    .trend-down { color: var(--red-text);   font-weight: 600; }
    .trend-flat { color: var(--text-muted); }

    /* Controls bar */
    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    #range-selector {
      display: flex;
      gap: 0.25rem;
    }

    .range-btn, #reset-zoom {
      padding: 0.35rem 0.75rem;
      border: 1px solid var(--border);
      background: var(--bg-alt);
      color: var(--text);
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
      user-select: none;
    }

    .range-btn:hover, #reset-zoom:hover {
      border-color: var(--text-muted);
    }

    .range-btn.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    #reset-zoom { margin-left: auto; }

    #range-info {
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    /* Chart grid */
    #chart-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
    }

    @media (max-width: 800px) {
      #chart-grid { grid-template-columns: 1fr; }
    }

    .category-card {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 0.9rem 0.9rem;
    }

    .category-card h3 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: var(--text);
    }

    .canvas-wrap {
      position: relative;
      height: 260px;
    }

    #no-data {
      color: var(--text-muted);
      font-size: 0.95rem;
      padding: 2rem 0;
    }
  </style>
</head>
<body>
  <h1>bison performance vs pandas</h1>
  <p id="subtitle">Loading...</p>

  <div id="no-data" style="display:none">
    No benchmark data found. Run <code>pixi run bench &amp;&amp; pixi run gen-report</code> to generate data.
  </div>

  <div id="content" style="display:none">
    <section>
      <h2>Latest run</h2>
      <table>
        <thead>
          <tr>
            <th>Operation</th>
            <th>bison (ms)</th>
            <th>pandas (ms)</th>
            <th>Ratio</th>
            <th>Trend</th>
          </tr>
        </thead>
        <tbody id="summary-body"></tbody>
      </table>
    </section>

    <section>
      <h2>Ratio over time (bison / pandas)</h2>

      <div id="controls">
        <div id="range-selector" role="group" aria-label="Commit range">
          <button class="range-btn" data-range="20" type="button">Last 20</button>
          <button class="range-btn" data-range="50" type="button">Last 50</button>
          <button class="range-btn" data-range="100" type="button">Last 100</button>
          <button class="range-btn" data-range="all" type="button">All</button>
        </div>
        <span id="range-info"></span>
        <button id="reset-zoom" type="button">Reset zoom</button>
      </div>

      <div id="chart-grid"></div>
    </section>
  </div>

  <script>
    // ---------------------------------------------------------------------------
    // Register the zoom plugin once Chart.js is on the page.
    // ---------------------------------------------------------------------------
    if (typeof Chart !== "undefined") {
      const zoomPlugin = window["chartjs-plugin-zoom"] || window.ChartZoom;
      if (zoomPlugin) Chart.register(zoomPlugin);
    }

    // ---------------------------------------------------------------------------
    // Colour palette — 10 distinct colours readable on both light and dark
    // ---------------------------------------------------------------------------
    const PALETTE = [
      "#2563eb", "#16a34a", "#dc2626", "#d97706", "#7c3aed",
      "#0891b2", "#db2777", "#65a30d", "#ea580c", "#4f46e5",
    ];

    // ---------------------------------------------------------------------------
    // Benchmark categories — declarative mapping from category to operation.
    // Unknown operations (present in data.json but not listed here) fall into
    // a catch-all "Other" card, so new benchmarks are never silently dropped.
    // ---------------------------------------------------------------------------
    const CATEGORIES = [
      { key: "aggregation", label: "Aggregation",
        ops: ["series_sum", "series_mean"] },
      { key: "groupby", label: "GroupBy",
        ops: ["groupby_sum"] },
      { key: "query", label: "Query / Eval",
        ops: ["query_simple", "query_and", "query_or", "eval_expr",
              "query_size_1k", "query_size_10k"] },
      { key: "indexing", label: "Indexing",
        ops: ["iloc_row", "loc_slice"] },
      { key: "sorting", label: "Sorting",
        ops: ["sort_values"] },
      { key: "merging", label: "Merging",
        ops: ["merge"] },
      { key: "transform", label: "Transform",
        ops: ["fillna", "series_apply"] },
      { key: "io", label: "I/O",
        ops: ["csv_roundtrip"] },
    ];

    const GITHUB_COMMIT_URL = (sha) =>
      `https://github.com/jredrupp/bison/commit/${sha}`;

    // ---------------------------------------------------------------------------
    // Helpers
    // ---------------------------------------------------------------------------
    function fmt(v, digits = 3) {
      return v == null ? "—" : v.toFixed(digits);
    }

    function ratioClass(ratio) {
      if (ratio == null) return "";
      if (ratio < 1.0) return "ratio-fast";
      if (ratio > 1.5) return "ratio-slow";
      return "ratio-mid";
    }

    function trendArrow(latestRatio, oldRatio) {
      if (latestRatio == null || oldRatio == null) return { text: "—", cls: "trend-flat" };
      const delta = latestRatio - oldRatio;
      if (delta < -0.05) return { text: "↑", cls: "trend-up" };   // improved
      if (delta >  0.05) return { text: "↓", cls: "trend-down" }; // degraded
      return { text: "→", cls: "trend-flat" };
    }

    // Stable per-op colour — indexed by position in data.operations so a given
    // op keeps the same colour across every category chart and across sessions.
    function colorFor(op, allOps) {
      const i = allOps.indexOf(op);
      return PALETTE[((i < 0 ? 0 : i) % PALETTE.length)];
    }

    // Build the categories that will actually render for this dataset, plus a
    // catch-all "Other" card for any op not already claimed.
    function resolveCategories(allOps) {
      const claimed = new Set(CATEGORIES.flatMap(c => c.ops));
      const leftover = allOps.filter(op => !claimed.has(op));
      const cats = CATEGORIES
        .map(c => ({ ...c, ops: c.ops.filter(op => allOps.includes(op)) }))
        .filter(c => c.ops.length > 0);
      if (leftover.length) {
        cats.push({ key: "other", label: "Other", ops: leftover });
      }
      return cats;
    }

    // ---------------------------------------------------------------------------
    // Parity-line plugin — shared by every category chart. Bails out when y=1.0
    // is off-screen, which is the correct behaviour for auto-scaled charts.
    // ---------------------------------------------------------------------------
    const parityLinePlugin = {
      id: "parityLine",
      afterDraw(chart) {
        const { ctx, chartArea: { left, right }, scales: { y } } = chart;
        const yPx = y.getPixelForValue(1.0);
        if (yPx < chart.chartArea.top || yPx > chart.chartArea.bottom) return;
        ctx.save();
        ctx.strokeStyle = "rgba(128,128,128,0.55)";
        ctx.lineWidth = 1.5;
        ctx.setLineDash([6, 4]);
        ctx.beginPath();
        ctx.moveTo(left, yPx);
        ctx.lineTo(right, yPx);
        ctx.stroke();
        ctx.restore();
      },
    };

    // ---------------------------------------------------------------------------
    // Dashboard state
    // ---------------------------------------------------------------------------
    const STATE = {
      allRuns: [],    // chronological (oldest first)
      allOps: [],
      categories: [],
      range: 50,      // "all" or a positive integer
      charts: {},     // { [category.key]: Chart instance }
    };

    // ---------------------------------------------------------------------------
    // Main
    // ---------------------------------------------------------------------------
    fetch("data.json")
      .then(r => r.json())
      .then(data => render(data))
      .catch(() => {
        document.getElementById("subtitle").textContent = "Could not load data.json.";
        document.getElementById("no-data").style.display = "";
      });

    function render(data) {
      const runs = data.runs || [];
      const ops  = data.operations || [];

      if (runs.length === 0) {
        document.getElementById("subtitle").textContent = "No runs recorded yet.";
        document.getElementById("no-data").style.display = "";
        return;
      }

      document.getElementById("content").style.display = "";

      // Runs are stored newest-first; latest is index 0
      const latest = runs[0];
      const ts = latest.timestamp
        ? new Date(latest.timestamp).toUTCString()
        : "unknown";
      document.getElementById("subtitle").textContent =
        `Last updated: ${ts} — commit ${latest.short_commit} (${latest.ref}) — ${runs.length} run(s) in history`;

      // ------------------------------------------------------------------
      // Summary table
      // ------------------------------------------------------------------
      // For trend: find a run ~10 commits back
      const oldRun = runs.length > 10 ? runs[10] : runs[runs.length - 1];

      const tbody = document.getElementById("summary-body");
      tbody.innerHTML = "";
      for (const op of ops) {
        const res = latest.results[op];
        const oldRes = oldRun.results ? oldRun.results[op] : null;
        const tr = document.createElement("tr");

        if (!res || res.bison_ms == null) {
          tr.innerHTML = `
            <td>${op}</td>
            <td class="skipped" colspan="4">skipped (not implemented)</td>`;
        } else {
          const { text: arrow, cls: arrowCls } = trendArrow(
            res.ratio,
            oldRes ? oldRes.ratio : null
          );
          tr.innerHTML = `
            <td>${op}</td>
            <td>${fmt(res.bison_ms)}</td>
            <td>${fmt(res.pandas_ms)}</td>
            <td class="${ratioClass(res.ratio)}">${fmt(res.ratio, 2)}x</td>
            <td class="${arrowCls}">${arrow}</td>`;
        }
        tbody.appendChild(tr);
      }

      // ------------------------------------------------------------------
      // Category charts
      // ------------------------------------------------------------------
      STATE.allRuns    = [...runs].reverse();  // oldest -> newest
      STATE.allOps     = ops;
      STATE.categories = resolveCategories(ops);

      // If we have fewer than 50 runs, default the active range to "all" so a
      // first-time viewer sees the whole history.
      if (STATE.allRuns.length <= 50) STATE.range = "all";

      buildChartGrid();
      wireControls();
      renderCharts();
    }

    function buildChartGrid() {
      const grid = document.getElementById("chart-grid");
      grid.innerHTML = "";
      for (const cat of STATE.categories) {
        const card = document.createElement("div");
        card.className = "category-card";
        card.innerHTML = `
          <h3>${cat.label}</h3>
          <div class="canvas-wrap"><canvas id="chart-${cat.key}"></canvas></div>`;
        grid.appendChild(card);
      }
    }

    function wireControls() {
      const buttons = document.querySelectorAll(".range-btn");
      buttons.forEach(btn => {
        const r = btn.dataset.range;
        const isActive =
          (r === "all" && STATE.range === "all") ||
          (r !== "all" && STATE.range === parseInt(r, 10));
        btn.classList.toggle("active", isActive);

        btn.addEventListener("click", () => {
          STATE.range = r === "all" ? "all" : parseInt(r, 10);
          buttons.forEach(b => b.classList.toggle("active", b === btn));
          renderCharts();
        });
      });

      document.getElementById("reset-zoom").addEventListener("click", () => {
        Object.values(STATE.charts).forEach(c => {
          if (typeof c.resetZoom === "function") c.resetZoom();
        });
      });
    }

    function visibleRuns() {
      if (STATE.range === "all") return STATE.allRuns;
      return STATE.allRuns.slice(-STATE.range);
    }

    function renderCharts() {
      const runs   = visibleRuns();
      const labels = runs.map(r => r.short_commit);

      // Update the "showing N of M" caption
      const info = document.getElementById("range-info");
      if (runs.length > 0) {
        const first = runs[0].timestamp ? runs[0].timestamp.slice(0, 10) : "?";
        const last  = runs[runs.length - 1].timestamp
          ? runs[runs.length - 1].timestamp.slice(0, 10)
          : "?";
        info.textContent =
          `showing ${runs.length} of ${STATE.allRuns.length} (${first} → ${last})`;
      } else {
        info.textContent = "";
      }

      for (const cat of STATE.categories) {
        const datasets = cat.ops.map(op => ({
          label: op,
          data: runs.map(r => {
            const res = r.results ? r.results[op] : null;
            return (res && res.bison_ms != null) ? res.ratio : null;
          }),
          borderColor: colorFor(op, STATE.allOps),
          backgroundColor: colorFor(op, STATE.allOps) + "33",
          borderWidth: 2,
          pointRadius: runs.length > 40 ? 1.5 : 3,
          pointHoverRadius: 5,
          tension: 0.2,
          spanGaps: true,
        }));

        // Destroy + rebuild on every render: cheap (<=8 charts, <=200 points)
        // and sidesteps stale zoom state after label swaps.
        if (STATE.charts[cat.key]) STATE.charts[cat.key].destroy();
        STATE.charts[cat.key] = buildCategoryChart(cat, labels, datasets, runs);
      }
    }

    function buildCategoryChart(cat, labels, datasets, runs) {
      const isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      const gridColor  = isDark ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.07)";
      const labelColor = isDark ? "#8b949e" : "#656d76";

      return new Chart(document.getElementById(`chart-${cat.key}`), {
        type: "line",
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          onClick: (evt, elements, chart) => {
            let idx = null;
            if (elements && elements.length) {
              idx = elements[0].index;
            } else {
              const near = chart.getElementsAtEventForMode(
                evt, "nearest", { intersect: false }, true
              );
              if (near.length) idx = near[0].index;
            }
            if (idx == null) return;
            const run = runs[idx];
            if (run && run.commit) {
              window.open(GITHUB_COMMIT_URL(run.commit), "_blank", "noopener");
            }
          },
          plugins: {
            legend: {
              display: true,
              position: "top",
              labels: {
                color: labelColor,
                boxWidth: 10,
                font: { size: 11 },
                padding: 8,
              },
            },
            tooltip: {
              callbacks: {
                title: (items) => {
                  const r = runs[items[0].dataIndex];
                  const ts = r.timestamp
                    ? new Date(r.timestamp).toISOString().replace("T", " ").slice(0, 19) + " UTC"
                    : "";
                  return `${r.short_commit} (${r.ref || "?"})\n${ts}`;
                },
                label: (item) => {
                  const v = item.raw;
                  if (v == null) return `${item.dataset.label}: skipped`;
                  return `${item.dataset.label}: ${v.toFixed(3)}x`;
                },
                footer: () => "Click point to open commit on GitHub",
              },
            },
            zoom: {
              pan:  { enabled: true, mode: "x", modifierKey: "shift" },
              zoom: {
                wheel: { enabled: true },
                pinch: { enabled: true },
                drag:  { enabled: true, backgroundColor: "rgba(100,100,100,0.15)" },
                mode: "x",
              },
            },
          },
          scales: {
            x: {
              ticks: { color: labelColor, maxRotation: 45, autoSkip: true, maxTicksLimit: 12 },
              grid:  { color: gridColor },
            },
            y: {
              title: { display: true, text: "ratio (bison / pandas)", color: labelColor },
              ticks: { color: labelColor },
              grid:  { color: gridColor },
              // No `min: 0` — per-category auto-scaling reveals small regressions.
            },
          },
        },
        plugins: [parityLinePlugin],
      });
    }
  </script>
</body>
</html>
