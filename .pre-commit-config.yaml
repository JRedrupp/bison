repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
  - repo: local
    hooks:
      - id: no-bare-raise-stubs
        name: "no bare raise Error() stubs (use _not_implemented)"
        language: pygrep
        entry: 'raise Error\([^)]*not.yet.implemented[^)]*\)'
        files: ^bison/.*\.mojo$
        types: [file]
      - id: mojo-format
        name: "mojo format (auto-format Mojo files)"
        language: script
        entry: scripts/fmt_check.sh
        files: ^bison/.*\.mojo$
        types: [file]
      - id: mojo-build-werror
        name: "mojo build --Werror (no warnings allowed)"
        language: script
        entry: scripts/check_werror.sh
        pass_filenames: false
        files: ^bison/.*\.mojo$
