repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: mojo-format
        name: mojo format
        language: system
        entry: mojo format
        types_or: [file]
        files: \.mojo$
        pass_filenames: true
